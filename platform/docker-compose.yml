services:
  scoreboard:
    build: .
    container_name: ctf-scoreboard
    ports:
      - "8000:8000"
    volumes:
      - scoreboard_data:/app/data
    environment:
      - INSTANCE_MANAGER_URL=http://ctf-instance-manager:9000
      - CTF_HOST=localhost
    restart: unless-stopped
    networks:
      - ctf-net

volumes:
  scoreboard_data:

networks:
  ctf-net:
    external: true
    name: ctf-net
