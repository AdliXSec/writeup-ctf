services:
  scoreboard:
    build: .
    container_name: ctf-scoreboard
    ports:
      - "8000:8000"
    volumes:
      - scoreboard_data:/app/data
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - ctf-net

volumes:
  scoreboard_data:

networks:
  ctf-net:
    external: true
    name: ctf-net
