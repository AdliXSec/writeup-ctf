{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto mt-10">
    <div class="glass rounded-xl p-8 shadow-2xl">
        <h2 class="text-3xl font-bold mb-6 text-center">Login</h2>
        
        <form id="authForm">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-300 mb-2">Email Address</label>
                <input type="email" id="username" required 
                       class="w-full bg-slate-800/50 border border-slate-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-sky-500 transition">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-300 mb-2">Password</label>
                <input type="password" id="password" required 
                       class="w-full bg-slate-800/50 border border-slate-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-sky-500 transition">
            </div>
            <button type="submit" class="w-full bg-sky-500 hover:bg-sky-600 text-white font-bold py-3 px-4 rounded-lg transition shadow-lg shadow-sky-500/30">
                Login
            </button>
        </form>
        
        <p class="mt-6 text-center text-sm text-gray-400">
            Belum punya akun? <a href="/register" class="text-sky-400 hover:underline">Daftar sekarang</a>
        </p>
    </div>
</div>

<script>
document.getElementById('authForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    try {
        const res = await fetch('/api/v2/authenticate', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        
        if(res.ok) {
            localStorage.setItem('token', data.token);
            window.location.href = '/';
        } else {
            showFlash(data.detail || 'Login gagal', 'error');
        }
    } catch (err) {
        showFlash('Koneksi ke server gagal', 'error');
    }
});
</script>
{% endblock %}
