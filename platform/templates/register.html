{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto mt-10">
    <div class="glass rounded-xl p-8 shadow-2xl">
        <h2 class="text-3xl font-bold mb-6 text-center">Register</h2>
        
        <form id="regForm">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-300 mb-2">Username</label>
                <input type="text" id="username" required 
                       class="w-full bg-slate-800/50 border border-slate-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-sky-500 transition">
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-300 mb-2">Email</label>
                <input type="email" id="email" required 
                       class="w-full bg-slate-800/50 border border-slate-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-sky-500 transition">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-300 mb-2">Password</label>
                <input type="password" id="password" required 
                       class="w-full bg-slate-800/50 border border-slate-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-sky-500 transition">
            </div>
            <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-4 rounded-lg transition shadow-lg shadow-emerald-500/30">
                Register
            </button>
        </form>
        
        <p class="mt-6 text-center text-sm text-gray-400">
            Sudah punya akun? <a href="/login" class="text-sky-400 hover:underline">Login sekarang</a>
        </p>
    </div>
</div>

<script>
document.getElementById('regForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('username').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    try {
        const res = await fetch('/api/v2/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ username, email, password })
        });
        const data = await res.json();
        
        if(res.ok) {
            window.location.href = '/login';
        } else {
            showFlash(data.detail || 'Registrasi gagal', 'error');
        }
    } catch (err) {
        showFlash('Koneksi ke server gagal', 'error');
    }
});
</script>
{% endblock %}
