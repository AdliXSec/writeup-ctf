# =============================================================================
# CTF Challenge Stack — Dynamic Instancing
# =============================================================================
# Usage:
#   docker compose build                    # Build all challenge images
#   docker compose up -d                    # Start instance manager only
#   curl -X POST http://localhost:9000/provision -d '{"team_id":1}'
# =============================================================================

services:
  # ── Instance Manager (always runs) ──
  instance-manager:
    build: ./instance_manager
    container_name: ctf-instance-manager
    ports:
      - "9000:9000"
    env_file:
      - .env
    volumes:
      - //var/run/docker.sock:/var/run/docker.sock
      - instance_data:/data
    restart: unless-stopped
    networks:
      - ctf-net

  # ── Challenge Images (build-only, not started by `docker compose up`) ──
  fetcher:
    build: ./fetcher/chall
    image: ctf-fetcher
    profiles: ["build"]

  nslookup:
    build: ./nslookup/chall
    image: ctf-nslookup
    profiles: ["build"]

  gag-wiki:
    build: ./gag-wiki/chall
    image: ctf-gagwiki
    profiles: ["build"]

  svg-viewer:
    build: ./svg-viewer/chall
    image: ctf-svgviewer
    profiles: ["build"]

  passforge:
    build: ./passforge/chall
    image: ctf-passforge
    profiles: ["build"]

  papermaker:
    build: ./papermaker/chall
    image: ctf-papermaker
    profiles: ["build"]

  betorganizer:
    build: ./betorganizer/chall
    image: ctf-betorganizer
    profiles: ["build"]

  archivedesk:
    build: ./archivedesk/chall
    image: ctf-archivedesk
    profiles: ["build"]

  action-packed:
    build: ./action-packed/chall
    image: ctf-action-packed
    profiles: ["build"]

  silent-oracle:
    build: ./silent-oracle/chall
    image: ctf-silent-oracle
    profiles: ["build"]

  neon-reactor:
    build: ./neon-reactor/chall
    image: ctf-neon-reactor
    profiles: ["build"]

  optix-archiver:
    build: ./optix-archiver/chall
    image: ctf-optix-archiver
    profiles: ["build"]

volumes:
  instance_data:

networks:
  ctf-net:
    name: ctf-net
    driver: bridge
