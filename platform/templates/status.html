{% extends 'base.html' %}

{% block content %}
<div class="max-w-3xl mx-auto mt-10">
    <div class="text-center mb-10">
        <h1 class="text-4xl font-bold mb-3 text-fuchsia-400">Game Status</h1>
        <p class="text-gray-400">Status Server CTF dan Scheduler secara Real-Time.</p>
    </div>
    
    <div id="status-container" class="glass rounded-xl p-8 shadow-2xl">
        <p class="text-center text-gray-400 py-8">Memuat status...</p>
    </div>
</div>

<script>
async function loadStatus() {
    if(!token) {
        window.location.href = '/login';
        return;
    }
    
    try {
        const res = await fetch('/api/v2/game/status', {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        
        if(res.ok) {
            const data = await res.json();
            
            const matchStateColor = data.match.state === 'running' ? 'text-emerald-400' : 'text-rose-400';
            const acceptSub = data.match.accepting_submissions ? '<span class="text-emerald-400">YES</span>' : '<span class="text-rose-400">NO</span>';
            
            const html = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <!-- Match Panel -->
                    <div>
                        <h2 class="text-xl font-bold border-b border-slate-700 pb-2 mb-4 text-white">Match Information</h2>
                        <ul class="space-y-3">
                            <li class="flex justify-between">
                                <span class="text-gray-400">State</span>
                                <span class="font-bold uppercase ${matchStateColor}">${data.match.state}</span>
                            </li>
                            <li class="flex justify-between">
                                <span class="text-gray-400">Started At</span>
                                <span class="text-sm text-white">${new Date(data.match.started_at).toLocaleString()}</span>
                            </li>
                            <li class="flex justify-between">
                                <span class="text-gray-400">Accepting Submissions</span>
                                <span class="font-bold">${acceptSub}</span>
                            </li>
                        </ul>
                    </div>
                    
                    <!-- Scheduler Panel -->
                    <div>
                        <h2 class="text-xl font-bold border-b border-slate-700 pb-2 mb-4 text-white">Instance Manager</h2>
                        <ul class="space-y-3">
                            <li class="flex justify-between">
                                <span class="text-gray-400">Manager State</span>
                                <span class="font-bold text-sky-400 uppercase">RUNNING</span>
                            </li>
                            <li class="flex justify-between">
                                <span class="text-gray-400">Architecture</span>
                                <span class="text-white">Dynamic On-Demand</span>
                            </li>
                            <li class="flex justify-between">
                                <span class="text-gray-400">Mode</span>
                                <span class="text-fuchsia-400 font-bold text-lg">JEOPARDY CTF</span>
                            </li>
                        </ul>
                    </div>
                </div>
                
                <div class="mt-8 pt-4 border-t border-slate-700 text-center">
                    <span class="text-xs text-gray-500 flex items-center justify-center gap-2">
                        <span class="relative flex h-3 w-3">
                          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                          <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                        </span>
                        API Connection Stable
                    </span>
                </div>
            `;
            document.getElementById('status-container').innerHTML = html;
            
            // No countdown needed for dynamic instancing
        } else {
            document.getElementById('status-container').innerHTML = `<p class="text-center text-rose-500 py-8">Gagal memuat status.</p>`;
        }
    } catch(e) {
        console.error(e);
        document.getElementById('status-container').innerHTML = `<p class="text-center text-rose-500 py-8">Terjadi kesalahan jaringan.</p>`;
    }
}

document.addEventListener('DOMContentLoaded', () => {
    loadStatus();
    setInterval(loadStatus, 15000); // Auto refresh every 15s
});
</script>
{% endblock %}
