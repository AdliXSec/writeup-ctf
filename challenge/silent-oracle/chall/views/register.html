<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Internal Portal</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f3f4f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
        h1 { margin-top: 0; font-size: 1.5rem; text-align: center; color: #111827; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.875rem; color: #374151; font-weight: 500; }
        input { width: 100%; padding: 0.75rem; margin-bottom: 1.5rem; border: 1px solid #d1d5db; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; background-color: #10b981; color: white; border: none; padding: 0.75rem; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 1rem; }
        button:hover { background-color: #059669; }
        p { text-align: center; font-size: 0.875rem; margin-top: 1.5rem; color: #6b7280; }
        a { color: #10b981; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Register Account</h1>
        <form id="registerForm">
            <label>Username</label>
            <input type="text" id="username" required>
            <label>Password</label>
            <input type="password" id="password" required>
            <button type="submit">Register</button>
        </form>
        <p>Already registered? <a href="/login">Login here</a></p>
    </div>

    <script>
        if (localStorage.getItem('token')) {
            window.location = '/';
        }
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            
            const query = `
                mutation {
                    register(username: "${u.replace(/"/g, '\\"')}", password: "${p.replace(/"/g, '\\"')}")
                }
            `;
            
            try {
                const res = await fetch('/graphql', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });
                const json = await res.json();
                
                if (json.data && json.data.register === "Success") {
                    window.location = '/login';
                } else {
                    alert(json.data.register || "Error registering");
                }
            } catch (err) {
                alert("Network error");
            }
        });
    </script>
</body>
</html>
