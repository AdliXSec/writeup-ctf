<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Portal - Internal</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
        }
        h1 { margin-top: 0; font-size: 1.5rem; border-bottom: 1px solid #e5e7eb; padding-bottom: 1rem; }
        h2 { font-size: 1.25rem; margin-top: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; font-size: 0.875rem;}
        input[type="text"] {
            width: 100%;
            padding: 0.5rem;
            margin-bottom: 1rem;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
        }
        button:hover { background-color: #2563eb; }
        .danger-zone {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px dashed #ef4444;
        }
        .danger-btn { background-color: #ef4444; }
        .danger-btn:hover { background-color: #dc2626; }
        #message {
            margin-top: 1rem;
            padding: 0.5rem;
            border-radius: 4px;
            display: none;
        }
        .success { background-color: #d1fae5; color: #065f46; }
    </style>
</head>
<body>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e5e7eb; margin-bottom: 1rem;">
        <h1 style="border-bottom: none; margin-bottom: 0;">Internal Employee Portal</h1>
        <a href="/logout" style="color: #ef4444; text-decoration: none; font-size: 0.875rem;">Logout</a>
    </div>
    
    <h2>Update Details</h2>
    <form id="updateForm">
        <label for="name">Name</label>
        <input type="text" id="name" name="1_name" value="Employee">
        
        <label for="dept">Department</label>
        <input type="text" id="dept" name="1_department" value="Staff">
        
        <input type="hidden" name="0" value='["$K1"]'>
        <!-- Mocking Next.js action payload structure -->
        <input type="hidden" name="1_$ACTION_ID_cd2b4b472561774fc0bd652dc4da5719a893167d" value="">
        
        <button type="submit">Update Profile</button>
    </form>
    
    <div id="message"></div>

    <div class="danger-zone">
        <h2>Admin Actions</h2>
        <p style="font-size: 0.875rem; color: #6b7280; margin-bottom: 1rem;">
            Generate a Master Token for programmatic API access. Restricted to administrators.
        </p>
        <form id="masterForm">
            <input type="hidden" name="0" value='["$K1"]'>
            <input type="hidden" name="1_$ACTION_ID_33924c174e655435ab82a6bdaee5448329835b12" value="">
            
            <button type="submit" class="danger-btn">Generate Master Token</button>
        </form>
    </div>
</div>

<script>
    document.getElementById('updateForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const msgDiv = document.getElementById('message');
        
        try {
            const res = await fetch('/', {
                method: 'POST',
                headers: {
                    'Next-Action': 'cd2b4b472561774fc0bd652dc4da5719a893167d',
                    'Accept': 'text/x-component'
                },
                body: formData
            });
            
            if (res.ok) {
                msgDiv.textContent = "Profile updated successfully.";
                msgDiv.className = "success";
                msgDiv.style.display = "block";
                setTimeout(() => msgDiv.style.display = "none", 3000);
            }
        } catch (err) {
            console.error(err);
        }
    });

    let currentUserRole = 'user';
    
    // Fetch user role on load
    fetch('/api/me').then(r => r.json()).then(data => {
        currentUserRole = data.role;
    }).catch(console.error);

    document.getElementById('masterForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const formData = new FormData(e.target);
        
        try {
            // Selalu kirim request terlepas dari rolenya
            const res = await fetch('/', {
                method: 'POST',
                headers: {
                    'Next-Action': '33924c174e655435ab82a6bdaee5448329835b12',
                    'Accept': 'text/x-component'
                },
                body: formData
            });
            
            // UI HANYA menampilkan balasan jika role adalah admin
            // Jika bukan admin, seolah-olah tombol "mati" (tidak ada feedback)
            if (currentUserRole === 'admin') {
                if (res.ok) {
                    const text = await res.text();
                    const lines = text.split(/\r?\n/);
                    if (lines.length > 1) {
                        const dataObj = JSON.parse(lines[1].substring(2));
                        if (dataObj.token) {
                            alert("Master Token Generated: " + dataObj.token);
                        }
                    }
                } else {
                    alert("Server Error");
                }
            }
            // Jika role !== 'admin', secara sengaja kita acuhkan balasannya.
            // Hacker tetap bisa melihat flag di tab Network DevTools karena HTTP request tetap jalan!
            
        } catch (err) {
            console.error(err);
        }
    });
</script>

</body>
</html>
