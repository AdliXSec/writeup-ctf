{% extends 'base.html' %}

{% block content %}
<div class="max-w-4xl mx-auto mt-10 grid grid-cols-1 md:grid-cols-2 gap-8">
    
    <!-- Profile Info Box -->
    <div class="glass rounded-xl p-8 shadow-2xl h-fit">
        <h2 class="text-2xl font-bold mb-6 border-b border-slate-700 pb-4 text-emerald-400">Identity</h2>
        <div id="profile-content" class="space-y-4">
            <p class="text-center text-gray-400 py-8">Memuat profil...</p>
        </div>
    </div>

    <!-- Profile Settings Box -->
    <div class="glass rounded-xl p-8 shadow-2xl">
        <h2 class="text-2xl font-bold mb-6 border-b border-slate-700 pb-4 text-sky-400">Settings</h2>
        <form id="settingsForm" class="space-y-4 hidden">
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Display Name</label>
                <input type="text" id="set-username" class="w-full bg-slate-800/50 border border-slate-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-sky-500 transition">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Email</label>
                <input type="email" id="set-email" class="w-full bg-slate-800/50 border border-slate-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-sky-500 transition">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Website</label>
                <input type="url" id="set-website" placeholder="https://..." class="w-full bg-slate-800/50 border border-slate-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-sky-500 transition">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Affiliation</label>
                <input type="text" id="set-affiliation" placeholder="University / Company / Club" class="w-full bg-slate-800/50 border border-slate-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-sky-500 transition">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Country</label>
                <input type="text" id="set-country" placeholder="e.g. Indonesia" class="w-full bg-slate-800/50 border border-slate-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-sky-500 transition">
            </div>
            <button type="submit" class="w-full mt-4 bg-sky-500 hover:bg-sky-600 text-white font-bold py-3 px-4 rounded-lg transition shadow-lg shadow-sky-500/30">
                Update Profile
            </button>
        </form>
    </div>

</div>

<script>
async function loadProfile() {
    if(!token) {
        window.location.href = '/login';
        return;
    }
    
    try {
        const res = await fetch('/api/v2/session', {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        
        if(res.ok) {
            const data = await res.json();
            
            // Populate Identity
            const html = `
                <div class="flex justify-between items-center border-b border-slate-700/50 pb-3">
                    <span class="text-gray-400 font-semibold">Display Name</span>
                    <span class="font-bold text-sky-400">${escapeHTML(data.name)}</span>
                </div>
                <div class="flex justify-between items-center border-b border-slate-700/50 pb-3">
                    <span class="text-gray-400 font-semibold">Role</span>
                    <span class="text-white capitalize bg-emerald-500/20 text-emerald-400 px-3 py-1 rounded text-xs font-bold">${escapeHTML(data.role)}</span>
                </div>
            `;
            document.getElementById('profile-content').innerHTML = html;

            // Populate Settings Form
            document.getElementById('set-username').value = data.name || '';
            document.getElementById('set-email').value = data.email || '';
            document.getElementById('set-website').value = data.website || '';
            document.getElementById('set-affiliation').value = data.affiliation || '';
            document.getElementById('set-country').value = data.country || '';
            
            document.getElementById('settingsForm').classList.remove('hidden');

        } else {
            document.getElementById('profile-content').innerHTML = `<p class="text-center text-rose-500 py-8">Gagal memuat profil. Silakan login kembali.</p>`;
        }
    } catch(e) {
        console.error(e);
        document.getElementById('profile-content').innerHTML = `<p class="text-center text-rose-500 py-8">Terjadi kesalahan jaringan.</p>`;
    }
}

document.getElementById('settingsForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const payload = {
        username: document.getElementById('set-username').value,
        email: document.getElementById('set-email').value,
        website: document.getElementById('set-website').value,
        affiliation: document.getElementById('set-affiliation').value,
        country: document.getElementById('set-country').value,
    };

    try {
        const res = await fetch('/api/v2/profile', {
            method: 'PATCH',
            headers: {
                'Authorization': 'Bearer ' + token,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
        });
        
        const data = await res.json();
        if(res.ok) {
            showFlash('Profil berhasil diperbarui!', 'success');
            loadProfile();
        } else {
            showFlash(data.detail || 'Gagal memperbarui profil', 'error');
        }
    } catch(err) {
        showFlash('Koneksi ke server gagal', 'error');
    }
});

document.addEventListener('DOMContentLoaded', loadProfile);
</script>
{% endblock %}
