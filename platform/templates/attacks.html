{% extends 'base.html' %}

{% block content %}
<div class="max-w-5xl mx-auto mt-10">
    <div class="text-center mb-10">
        <h1 class="text-4xl font-bold mb-3 text-rose-400">Log Serangan Global</h1>
        <p class="text-gray-400">Log aktivitas penyerangan (solve) dari seluruh peserta secara Real-Time.</p>
    </div>
    
    <div class="glass rounded-xl overflow-hidden shadow-2xl">
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="bg-slate-800/50 border-b border-slate-700">
                    <th class="py-4 px-6 font-semibold">Waktu</th>
                    <th class="py-4 px-6 font-semibold">Attacker (Tim)</th>
                    <th class="py-4 px-6 font-semibold">Target Service</th>
                    <th class="py-4 px-6 font-semibold">Status / Verdict</th>
                </tr>
            </thead>
            <tbody id="attacks-page-body">
                <tr><td colspan="4" class="py-8 text-center text-gray-500">Memuat log serangan...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
async function loadFullAttacks() {
    if(!token) {
        window.location.href = '/login';
        return;
    }
    
    try {
        const res = await fetch('/api/v2/attacks', {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        
        if(res.ok) {
            const data = await res.json();
            const tbody = document.getElementById('attacks-page-body');
            
            if(data.items.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="py-8 text-center text-gray-500">Belum ada serangan yang tercatat.</td></tr>`;
                return;
            }
            
            let html = '';
            data.items.forEach(item => {
                // Generate a pseudo-random time offset just for visual effect if we don't have real timestamps in the API item,
                // but wait, the API doesn't return timestamp. It returns tick. We'll just show the tick.
                html += `
                    <tr class="border-b border-slate-700/50 hover:bg-slate-800/30 transition">
                        <td class="py-4 px-6 font-mono text-gray-400 text-sm">Tick #${item.tick}</td>
                        <td class="py-4 px-6 font-bold text-emerald-400">${escapeHTML(item.attacker)}</td>
                        <td class="py-4 px-6 font-bold text-sky-400 uppercase">${item.service}</td>
                        <td class="py-4 px-6 text-sm text-gray-300">
                            <span class="bg-rose-500/20 text-rose-400 px-2 py-1 rounded border border-rose-500/50">
                                ${item.verdict}
                            </span>
                        </td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        }
    } catch(e) {
        console.error(e);
        document.getElementById('attacks-page-body').innerHTML = `<tr><td colspan="4" class="py-8 text-center text-rose-500">Terjadi kesalahan jaringan.</td></tr>`;
    }
}

document.addEventListener('DOMContentLoaded', () => {
    loadFullAttacks();
    setInterval(loadFullAttacks, 10000); // Auto refresh every 10s
});
</script>
{% endblock %}
