{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="glass rounded-xl p-8 shadow-2xl mb-8 border-t-4 border-emerald-500">
        <h2 class="text-2xl font-bold mb-2">Submit Flag</h2>
        <p class="text-gray-400 mb-6">Peringatan: Instance dan flag Anda memiliki batas waktu. Segera submit flag yang Anda temukan!</p>
        
        <form id="submitForm">
            <div class="mb-4">
                <label for="flag" class="block text-sm font-medium text-gray-300 mb-2">Format: LEEXY{...}</label>
                <input type="text" id="flag" required autofocus
                       class="w-full bg-slate-800/50 border border-slate-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition"
                       placeholder="LEEXY{xxxxxxxxxxxxx}">
            </div>
            <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-4 rounded-lg transition shadow-lg shadow-emerald-500/30">
                Submit Flag
            </button>
        </form>
    </div>

    <div class="glass rounded-xl p-6">
        <h3 class="text-lg font-bold mb-4 border-b border-slate-700 pb-2">Riwayat Submit Tim Anda</h3>
        <ul id="my-solves" class="space-y-3">
            <li class="text-sm text-gray-500 text-center py-4">Memuat data...</li>
        </ul>
    </div>
</div>

<script>
let teamName = "";

async function fetchMySolves() {
    if(!token) return;
    try {
        // Get team name first
        if(!teamName) {
            const sessRes = await fetch('/api/v2/session', { headers: { 'Authorization': 'Bearer ' + token } });
            if(sessRes.ok) {
                const sessData = await sessRes.json();
                teamName = sessData.team_name;
            }
        }
        
        // Fetch all attacks and filter by team name
        const res = await fetch('/api/v2/attacks', { headers: { 'Authorization': 'Bearer ' + token } });
        if(res.ok) {
            const data = await res.json();
            const mySolves = data.items.filter(item => item.attacker === teamName);
            
            const ul = document.getElementById('my-solves');
            if(mySolves.length === 0) {
                ul.innerHTML = `<li class="text-sm text-gray-500 text-center py-4">Belum ada tantangan yang diselesaikan.</li>`;
                return;
            }
            
            let html = '';
            mySolves.forEach(solve => {
                html += `
                    <li class="flex justify-between items-center bg-slate-800/30 p-3 rounded-lg border border-slate-700/50">
                        <span class="font-medium text-emerald-400">${solve.service.toUpperCase()}</span>
                        <span class="text-xs text-emerald-500 flex items-center gap-1">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                            Diselesaikan
                        </span>
                    </li>
                `;
            });
            ul.innerHTML = html;
        }
    } catch(e) {
        console.error(e);
    }
}

document.getElementById('submitForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    if(!token) {
        showFlash('Silakan login terlebih dahulu!', 'error');
        return;
    }
    
    const flagInput = document.getElementById('flag');
    const flag = flagInput.value.trim();

    try {
        const res = await fetch('/api/v2/submit', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + token
            },
            body: JSON.stringify([flag]) // spec requires array
        });
        
        const data = await res.json();
        if(res.ok) {
            const result = data.results[0];
            if(result.status === 'accepted') {
                showFlash(`🎉 Flag Benar! Anda mendapatkan poin tambahan.`, 'success');
                flagInput.value = '';
                fetchMySolves(); // Refresh list
            } else if(result.status === 'duplicate') {
                showFlash(`Anda sudah pernah menyelesaikan tantangan ini! Di mode Jeopardy, poin hanya diberikan 1 kali.`, 'error');
            } else {
                showFlash(`❌ ${result.detail || 'Flag salah atau expired!'}`, 'error');
            }
        } else {
            showFlash(data.detail || 'Gagal submit flag.', 'error');
        }
    } catch (err) {
        showFlash('Koneksi ke server gagal', 'error');
    }
});

document.addEventListener('DOMContentLoaded', fetchMySolves);
</script>
{% endblock %}
