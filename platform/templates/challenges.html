{% extends 'base.html' %}

{% block content %}
<div class="max-w-5xl mx-auto mt-10">
    <div class="text-center mb-10">
        <h1 class="text-4xl font-bold mb-3 text-sky-400">Daftar Tantangan</h1>
        <p class="text-gray-400">Tantangan CTF (On-Demand Instances).</p>
    </div>
    
    <div id="error-container" class="mb-6"></div>
    <div id="challenges-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <p class="col-span-full text-center text-gray-400 py-8">Memuat tantangan...</p>
    </div>
</div>

<!-- Modal Overlay -->
<div id="challenge-modal" class="fixed inset-0 z-50 hidden bg-black/60 backdrop-blur-sm flex items-center justify-center p-4">
    <!-- Modal Content -->
    <div class="glass w-full max-w-2xl max-h-[90vh] overflow-y-auto rounded-xl shadow-2xl border border-slate-700 relative flex flex-col">
        <!-- Close Button -->
        <button onclick="closeChallengeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-white transition">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
        
        <div class="p-8 pb-4 border-b border-slate-700/50 flex justify-between items-start">
            <div>
                <h2 id="modal-title" class="text-3xl font-bold text-white uppercase mb-2">TITLE</h2>
                <span id="modal-category" class="bg-sky-500/20 text-sky-400 text-xs px-2 py-1 rounded border border-sky-500/30">CATEGORY</span>
            </div>
            <div class="text-right">
                <span id="modal-points" class="text-2xl text-fuchsia-400 font-bold">100 pts</span>
            </div>
        </div>
        
        <div class="p-8 pt-6 flex-grow">
            <div class="relative bg-slate-900/40 rounded-lg p-4 mb-6 border border-slate-700/50 shadow-inner group-hover:border-sky-500/30 transition-colors">
                <div class="absolute -top-2.5 left-4 bg-slate-800 px-2 text-[10px] text-sky-400 font-bold uppercase tracking-widest border border-slate-700 rounded shadow-sm">INTEL</div>
                <div id="modal-desc" class="text-slate-300 text-sm whitespace-pre-wrap break-words mt-1 leading-relaxed font-mono">
                </div>
            </div>
            
            <div id="modal-instance-controls">
                <!-- Injected dynamically based on instance state -->
            </div>
            
            <div class="mt-6 border-t border-slate-700/50 pt-6">
                <label class="block text-xs text-gray-400 uppercase tracking-widest mb-2 font-bold">Submit Flag</label>
                <div class="flex gap-2">
                    <input type="text" id="modal-flag-input" placeholder="LEEXY{...}" class="w-full bg-slate-900 border border-slate-700 rounded px-4 py-2 text-white placeholder-slate-600 focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500">
                    <button onclick="submitModalFlag()" class="bg-sky-600 hover:bg-sky-500 text-white px-6 py-2 rounded font-bold transition">Submit</button>
                </div>
                <div id="modal-submit-res" class="mt-2 text-sm"></div>
            </div>
        </div>
    </div>
</div>

<script>
let countdownIntervals = {};
let currentModalChal = null;

function showError(msg) {
    const el = document.getElementById('error-container');
    el.innerHTML = `<div class="bg-red-500/20 border border-red-500 text-red-400 p-4 rounded-lg flex justify-between">
        <span>${msg}</span>
        <button onclick="this.parentElement.remove()">✕</button>
    </div>`;
    setTimeout(() => { el.innerHTML = ''; }, 5000);
}

async function apiCall(endpoint, method, challengeName) {
    try {
        const res = await fetch(endpoint, {
            method: method,
            headers: { 
                'Authorization': 'Bearer ' + token,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ challenge: challengeName })
        });
        const data = await res.json();
        if(!res.ok) {
            showError(data.error || 'Terjadi kesalahan.');
            return false;
        }
        return true;
    } catch(e) {
        showError('Kesalahan jaringan.');
        return false;
    }
}

async function startInstance(chalName) {
    if(await apiCall('/api/v2/game/instances/start', 'POST', chalName)) {
        loadChallenges();
    }
}

async function stopInstance(chalName) {
    if(await apiCall('/api/v2/game/instances/stop', 'POST', chalName)) {
        loadChallenges();
    }
}

async function extendInstance(chalName) {
    if(await apiCall('/api/v2/game/instances/extend', 'POST', chalName)) {
        loadChallenges();
    }
}

async function resetInstance(chalName) {
    if(await apiCall('/api/v2/game/instances/reset', 'POST', chalName)) {
        loadChallenges();
    }
}

function openChallengeModal(name) {
    currentModalChal = name;
    const chal = window.challengesData[name];
    if(!chal) return;
    
    document.getElementById('modal-title').innerText = chal.name;
    document.getElementById('modal-category').innerText = chal.category;
    document.getElementById('modal-points').innerText = chal.points + " pts";
    document.getElementById('modal-desc').innerHTML = chal.description || '<span class="italic text-slate-500">Tidak ada data intelijen yang tersedia.</span>';
    document.getElementById('modal-flag-input').value = "";
    document.getElementById('modal-submit-res').innerHTML = "";
    
    renderModalInstance(chal);
    
    document.getElementById('challenge-modal').classList.remove('hidden');
}

function closeChallengeModal() {
    document.getElementById('challenge-modal').classList.add('hidden');
    currentModalChal = null;
}

function renderModalInstance(chal) {
    const isRunning = chal.instance.status === 'running';
    const container = document.getElementById('modal-instance-controls');
    
    if(isRunning) {
        container.innerHTML = `
            <div class="mb-4 bg-slate-900/50 p-4 rounded border border-slate-700">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-xs text-gray-400 uppercase tracking-wider">Status:</span>
                    <span class="text-xs text-emerald-400 font-bold px-2 py-1 bg-emerald-500/10 rounded border border-emerald-500/20">RUNNING</span>
                </div>
                <div class="flex justify-between items-center mb-3">
                    <span class="text-xs text-gray-400 uppercase tracking-wider">Target:</span>
                    <span class="font-mono text-sm text-sky-400 select-all">${chal.instance.endpoint}</span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-xs text-gray-400 uppercase tracking-wider">Sisa Waktu:</span>
                    <span class="font-mono text-sm text-emerald-400 font-bold" data-expires="${chal.instance.expires_at}">Menghitung...</span>
                </div>
            </div>
            <div class="grid grid-cols-3 gap-2">
                <button onclick="extendInstance('${chal.name}')" class="text-xs font-bold bg-sky-500/20 hover:bg-sky-500/40 text-sky-400 p-2 rounded transition">+ 5 Menit</button>
                <button onclick="resetInstance('${chal.name}')" class="text-xs font-bold bg-amber-500/20 hover:bg-amber-500/40 text-amber-400 p-2 rounded transition">Factory Reset</button>
                <button onclick="stopInstance('${chal.name}')" class="text-xs font-bold bg-red-500/20 hover:bg-red-500/40 text-red-400 p-2 rounded transition">Stop Instance</button>
            </div>
        `;
    } else {
        container.innerHTML = `
            <div class="mb-4 flex items-center justify-center h-24 bg-slate-900/30 rounded border border-slate-800">
                <span class="text-gray-500 text-sm">Instance Tidak Aktif</span>
            </div>
            <button onclick="startInstance('${chal.name}')" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 px-4 rounded transition flex items-center justify-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                Mulai Instance
            </button>
        `;
    }
    
    if(chal.is_whitebox && chal.download_url) {
        container.innerHTML += `
            <div class="mt-4">
                <a href="${chal.download_url}" target="_blank" class="w-full flex items-center justify-center gap-2 bg-slate-800 hover:bg-slate-700 text-emerald-400 font-bold py-3 px-4 rounded border border-emerald-500/30 transition shadow-lg shadow-emerald-900/20">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    Download Source Code
                </a>
            </div>
        `;
    }
}

async function submitModalFlag() {
    const flag = document.getElementById('modal-flag-input').value;
    const resEl = document.getElementById('modal-submit-res');
    if(!flag) return;
    
    resEl.innerHTML = '<span class="text-gray-400">Menyerang...</span>';
    try {
        const res = await fetch('/submit', {
            method: 'POST',
            headers: {
                'Authorization': 'Bearer ' + token,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify([{"challenge_id": currentModalChal, "flag": flag}])
        });
        
        const data = await res.json();
        if(res.ok && data.results && data.results.length > 0) {
            const r = data.results[0];
            if(r.status === 'accepted') {
                resEl.innerHTML = `<span class="text-emerald-400 font-bold">🎉 ${r.message}</span>`;
                loadChallenges(); 
            } else if(r.status === 'duplicate') {
                resEl.innerHTML = `<span class="text-amber-400 font-bold">⚠️ ${r.message}</span>`;
            } else {
                resEl.innerHTML = `<span class="text-red-400 font-bold">❌ ${r.message}</span>`;
            }
        } else {
            resEl.innerHTML = `<span class="text-red-400 font-bold">❌ Gagal mengirim flag.</span>`;
        }
    } catch(e) {
        resEl.innerHTML = `<span class="text-red-400 font-bold">❌ Error jaringan.</span>`;
    }
}

function updateTimers() {
    document.querySelectorAll('[data-expires]').forEach(el => {
        const expiresAt = new Date(el.dataset.expires).getTime();
        const now = new Date().getTime();
        const distance = expiresAt - now;

        if (distance < 0) {
            el.innerHTML = "EXPIRED";
            el.classList.add('text-red-500');
            el.classList.remove('text-emerald-400');
            // Auto reload to clear it if expired
            setTimeout(loadChallenges, 2000);
            return;
        }

        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);
        
        el.innerHTML = minutes + "m " + (seconds < 10 ? "0" : "") + seconds + "s";
    });
}

async function loadChallenges() {
    if(!token) {
        window.location.href = '/login';
        return;
    }
    
    // Clear old intervals if reloading
    if(window.timerInterval) clearInterval(window.timerInterval);
    
    try {
        const res = await fetch('/api/v2/challenges', {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        
        if(res.status === 403) {
            const data = await res.json();
            const container = document.getElementById('challenges-container');
            container.innerHTML = `
                <div class="col-span-full glass rounded-xl p-16 text-center border-dashed border-2 border-slate-600 mt-10">
                    <span class="text-6xl block mb-6 animate-pulse">🔒</span>
                    <h3 class="text-3xl font-bold text-gray-300">Tantangan Terkunci</h3>
                    <p class="text-xl text-gray-500 mt-4">${escapeHTML(data.error || 'CTF Has Not Started Yet.')}</p>
                </div>
            `;
            return;
        }
        
        if(res.ok) {
            const data = await res.json();
            const container = document.getElementById('challenges-container');
            
            if(data.length === 0) {
                container.innerHTML = `<p class="col-span-full text-center text-gray-500 py-8">Belum ada tantangan yang tersedia.</p>`;
                return;
            }
            
            let html = '';
            window.challengesData = {}; // Store data globally
            
            data.forEach(chal => {
                window.challengesData[chal.name] = chal;
                const isRunning = chal.instance.status === 'running';
                
                html += `
                    <div onclick="openChallengeModal('${chal.name}')" class="cursor-pointer group glass rounded-xl p-6 shadow-lg transition duration-300 border-t-2 ${isRunning ? 'border-emerald-500 ring-1 ring-emerald-500/20' : 'border-slate-700 hover:border-sky-500'} ${chal.is_hidden ? 'opacity-80 grayscale-[0.5]' : ''}">
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="text-xl font-bold text-white uppercase">
                                    ${chal.name}
                                    ${chal.is_hidden ? '<span class="ml-2 align-middle text-[10px] uppercase font-bold tracking-wider bg-rose-500/20 text-rose-400 px-2 py-0.5 rounded border border-rose-500/30">DISABLED (ADMIN)</span>' : ''}
                                </h3>
                                <span class="inline-block mt-1 bg-sky-500/20 text-sky-400 text-xs px-2 py-0.5 rounded border border-sky-500/30">${chal.category}</span>
                            </div>
                            <div class="text-right">
                                <span class="text-fuchsia-400 font-bold">${chal.points} pts</span>
                                ${chal.is_dynamic ? '<div class="text-[10px] font-bold text-fuchsia-400/70 mt-1 uppercase tracking-wider" title="Nilai tantangan ini menurun seiring banyaknya solver">📉 Dynamic</div>' : ''}
                            </div>
                        </div>
                        <div class="mt-4 pt-4 border-t border-slate-700/50 flex justify-between items-center">
                            ${isRunning ? '<span class="text-xs text-emerald-400 font-bold flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span> RUNNING</span>' : '<span class="text-xs text-gray-500">OFFLINE</span>'}
                            <span class="text-xs text-sky-400 group-hover:text-sky-300 transition-colors">Buka &rarr;</span>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
            
            // Re-render modal if it is currently open
            if(currentModalChal && window.challengesData[currentModalChal]) {
                renderModalInstance(window.challengesData[currentModalChal]);
            }
            
            // Start the timer loop
            window.timerInterval = setInterval(updateTimers, 1000);
            updateTimers(); // run once immediately
            
        } else {
            document.getElementById('challenges-container').innerHTML = `<p class="col-span-full text-center text-rose-500 py-8">Gagal memuat daftar tantangan.</p>`;
        }
    } catch(e) {
        console.error(e);
        document.getElementById('challenges-container').innerHTML = `<p class="col-span-full text-center text-rose-500 py-8">Terjadi kesalahan jaringan.</p>`;
    }
}

document.addEventListener('DOMContentLoaded', () => {
    loadChallenges();
    // Auto-refresh the challenges list every 10 seconds to sync real-time state
    setInterval(loadChallenges, 10000); 
});
</script>
{% endblock %}
