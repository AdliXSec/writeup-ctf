{% extends 'base.html' %}

{% block content %}
<div class="max-w-4xl mx-auto mt-10">
    <div class="flex items-center justify-between mb-8 border-b border-slate-700 pb-4">
        <h2 class="text-3xl font-bold text-amber-400 flex items-center gap-3">
            <span>📢</span>
            Global Notifications
        </h2>
        <button onclick="loadNotifications()" class="text-gray-400 hover:text-white transition">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
        </button>
    </div>

    <div id="notifications-container" class="space-y-6">
        <p class="text-center text-gray-400 py-10">Memuat pengumuman...</p>
    </div>
</div>

<script>
async function loadNotifications() {
    if(!token) {
        window.location.href = '/login';
        return;
    }
    
    const container = document.getElementById('notifications-container');
    container.innerHTML = '<p class="text-center text-gray-400 py-10">Memuat pengumuman...</p>';

    try {
        const res = await fetch('/api/v2/notifications', {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        
        if(!res.ok) {
            container.innerHTML = `<p class="text-center text-rose-500 py-10">Gagal memuat notifikasi.</p>`;
            return;
        }

        const data = await res.json();
        
        if (data.length === 0) {
            container.innerHTML = `
                <div class="glass rounded-xl p-10 text-center border-dashed border-2 border-slate-600">
                    <span class="text-4xl block mb-4">📭</span>
                    <h3 class="text-xl font-semibold text-gray-300">Belum Ada Pengumuman</h3>
                    <p class="text-gray-500 mt-2">Tetap fokus pada tantanganmu!</p>
                </div>
            `;
            return;
        }

        let html = '';
        data.forEach(notif => {
            const dateStr = new Date(notif.created_at + 'Z').toLocaleString('id-ID', {
                dateStyle: 'medium', timeStyle: 'short'
            });
            
            html += `
                <div class="glass rounded-xl p-6 shadow-lg border-l-4 border-amber-500 transform transition hover:-translate-y-1">
                    <div class="flex justify-between items-start mb-4">
                        <h3 class="text-xl font-bold text-white">${escapeHTML(notif.title)}</h3>
                        <span class="text-xs bg-slate-800 text-gray-400 px-3 py-1 rounded-full border border-slate-600">${escapeHTML(dateStr)}</span>
                    </div>
                    <div class="text-gray-300 prose prose-invert max-w-none">
                        ${escapeHTML(notif.message).replace(/\n/g, '<br>')}
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    } catch(e) {
        console.error(e);
        container.innerHTML = `<p class="text-center text-rose-500 py-10">Terjadi kesalahan jaringan.</p>`;
    }
}

document.addEventListener('DOMContentLoaded', loadNotifications);
</script>
{% endblock %}
